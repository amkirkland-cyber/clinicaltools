<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NAP Playbook</title>
<style>
:root{--bg:#f7f8fb;--card:#fff;--line:#e5e7eb;--muted:#6b7280;--text:#0f172a;--accent:#2563eb;--accent2:#0ea5e9;--accent3:#10b981;--accent4:#7c3aed;--warn:#92400e;--warnbg:#fff8e1}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}.wrap{max-width:1080px;margin:0 auto;padding:20px}h1{margin:0 0 12px;font-size:28px}.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.05)}.panel{padding:14px}.controls{display:grid;grid-template-columns:repeat(10,minmax(0,1fr));gap:10px}.span-2{grid-column:span 2}label{font-size:12px;color:var(--muted);display:block;margin:0 0 6px}select,input,textarea{width:100%;background:#fff;border:1px solid var(--line);color:var(--text);padding:10px;border-radius:10px;font:inherit}textarea{min-height:90px;resize:vertical}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.pill{display:inline-flex;gap:8px;align-items:center;border:1px solid var(--line);padding:6px 10px;border-radius:999px;color:var(--muted);font-size:13px;background:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:900px){.grid{grid-template-columns:1fr}.controls{grid-template-columns:repeat(2,1fr)}.span-2{grid-column:span 1}}.tasks{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}@media(max-width:760px){.tasks{grid-template-columns:1fr}}.tasks .card{min-height:110px}.notes{white-space:pre-wrap}.hr{height:1px;background:var(--line);margin:12px 0}.notice{background:var(--warnbg);border:1px solid #fde68a;color:var(--warn);padding:8px 10px;border-radius:10px;font-size:14px}.heading{font-weight:700;margin-bottom:6px}.h-primary{color:var(--accent)}.h-secondary{color:var(--accent2)}.h-tertiary{color:var(--accent3)}.h-notes{color:var(--accent4)}table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}th,td{border:1px solid var(--line);padding:8px;vertical-align:top;background:#fff;white-space:pre-wrap}th{background:#f3f4f6;text-align:left}.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;cursor:pointer}.btn.primary{background:#2563eb;color:white;border-color:#2563eb}.btn.good{background:#059669;color:#fff;border-color:#059669}.hidden{display:none}.edit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}@media(max-width:760px){.edit-grid{grid-template-columns:1fr}}.small{font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
<h1>NAP Playbook</h1>
<div id="loadError" class="notice hidden"></div>
<div class="card panel" style="margin-bottom:14px">
 <div class="row">
  <span class="pill"><span>Play:</span> <b id="playName">—</b></span>
  <span class="pill"><span>Rooming Ratio:</span> <b id="ratioName">—</b></span>
  <span class="pill"><span>Dedicated RN:</span> <b id="dedRn">—</b></span>
  <span class="pill"><span>Dedicated PSR:</span> <b id="dedPsr">—</b></span>
  <button id="toggleEdit" class="btn">Edit current play</button>
  <button id="exportMain" class="btn good">Export playbook CSV</button>
  <button id="exportAlways" class="btn">Export Always True CSV</button>
 </div>
</div>
<div class="card panel">
 <div class="controls">
  <div class="span-2"><label>Providers</label><select id="providers"></select></div>
  <div class="span-2"><label>RNs</label><select id="rns"></select></div>
  <div class="span-2"><label>MAs</label><select id="mas"></select></div>
  <div class="span-2"><label>PSRs</label><select id="psrs"></select></div>
  <div class="span-2"><label>Role</label><select id="role"><option>Provider</option><option>RN</option><option>MA</option><option>PSR</option><option>OM</option></select></div>
 </div>
</div>
<div id="editPanel" class="card panel hidden" style="margin-top:14px">
 <div class="row" style="justify-content:space-between"><div><b>Edit current scenario</b><div class="small">Edits stay in memory across all staffing selections until you export.</div></div><button id="saveEdits" class="btn primary">Save edits to memory</button></div>
 <div class="edit-grid" style="margin-top:10px">
  <div><label>Primary</label><textarea id="editPrimary"></textarea></div>
  <div><label>Secondary</label><textarea id="editSecondary"></textarea></div>
  <div><label>Tertiary</label><textarea id="editTertiary"></textarea></div>
 </div>
 <div style="margin-top:10px"><label>Notes</label><textarea id="editNotes"></textarea></div>
</div>
<div class="grid" style="margin-top:14px">
 <div class="card panel">
  <div class="tasks">
   <div class="card panel"><div class="heading h-primary">Primary</div><div id="primary">—</div></div>
   <div class="card panel"><div class="heading h-secondary">Secondary</div><div id="secondary">—</div></div>
   <div class="card panel"><div class="heading h-tertiary">Tertiary</div><div id="tertiary">—</div></div>
  </div>
  <div class="hr"></div><div class="heading h-notes">Notes</div><div id="notes" class="notes">—</div>
  <div class="hr"></div><div class="heading">Full Play Details</div><div id="fullDetails">—</div>
 </div>
 <div class="card panel">
  <div class="row" style="justify-content:space-between"><div style="font-weight:600">Always True</div><button id="toggleAlwaysEdit" class="btn">Edit</button></div>
  <div id="alwaysTrue" class="notes" style="margin-top:10px">—</div>
  <div id="alwaysEditBox" class="hidden" style="margin-top:10px"><textarea id="editAlways" style="min-height:240px"></textarea><button id="saveAlways" class="btn primary" style="margin-top:8px">Save Always True to memory</button></div>
 </div>
</div>
</div>
<script>
const MAIN_CSV = './nap_playbook_data.csv';
const ALWAYS_CSV = './nap_playbook_always_true.csv';
let DATA = [];
let ALWAYS_ROWS = [];
const el = id => document.getElementById(id);
const providersEl=el('providers'), rnsEl=el('rns'), masEl=el('mas'), psrsEl=el('psrs'), roleEl=el('role');
const playNameEl=el('playName'), ratioNameEl=el('ratioName'), dedRnEl=el('dedRn'), dedPsrEl=el('dedPsr');
const primaryEl=el('primary'), secondaryEl=el('secondary'), tertiaryEl=el('tertiary'), notesEl=el('notes'), fullDetailsEl=el('fullDetails');
function parseCSV(text){
  text = text.replace(/^\uFEFF/, '');
  const rows=[]; let row=[], cell='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(q){ if(c==='"' && n==='"'){cell+='"'; i++;} else if(c==='"'){q=false;} else cell+=c; }
    else { if(c==='"') q=true; else if(c===','){row.push(cell); cell='';} else if(c==='\n'){row.push(cell); rows.push(row); row=[]; cell='';} else if(c==='\r'){} else cell+=c; }
  }
  if(cell.length || row.length){ row.push(cell); rows.push(row); }
  const headers = rows.shift() || [];
  return rows.filter(r => r.some(x => String(x).trim() !== '')).map(r => Object.fromEntries(headers.map((h,i)=>[h, r[i] ?? ''])));
}
function csvEscape(v){ const s=String(v??''); return /[",\n\r]/.test(s) ? '"'+s.replaceAll('"','""')+'"' : s; }
function toCSV(rows){ if(!rows.length) return ''; const headers=Object.keys(rows[0]); return headers.map(csvEscape).join(',')+'\r\n'+rows.map(r=>headers.map(h=>csvEscape(r[h])).join(',')).join('\r\n')+'\r\n'; }
async function loadCSV(path){ const res = await fetch(path, {cache:'no-store'}); if(!res.ok) throw new Error(path+' returned '+res.status); return parseCSV(await res.text()); }
function fill(sel, min, max, def){ sel.innerHTML=''; for(let i=min;i<=max;i++){ const o=document.createElement('option'); o.value=o.textContent=String(i); if(i===def) o.selected=true; sel.appendChild(o); } }
function initControls(){ fill(providersEl,1,4,4); fill(rnsEl,0,3,1); fill(masEl,0,5,3); fill(psrsEl,0,3,1); roleEl.value='Provider'; }
function currentRow(){ const p=providersEl.value, r=rnsEl.value, m=masEl.value, s=psrsEl.value; return DATA.find(x => x.Providers===p && x.RNs===r && x.MAs===m && x.PSRs===s); }
function roleKey(){ return roleEl.value; }
function render(){ const row=currentRow(); if(!row){ playNameEl.textContent='No match'; return; } const role=roleKey();
 playNameEl.textContent=row.Play; ratioNameEl.textContent=row['Rooming Ratio']; dedRnEl.textContent=row['Dedicated RNs']; dedPsrEl.textContent=row['Dedicated PSRs'];
 primaryEl.textContent=row[role+' Primary'] || '—'; secondaryEl.textContent=row[role+' Secondary'] || '—'; tertiaryEl.textContent=row[role+' Tertiary'] || '—'; notesEl.textContent=row.Notes || '—'; renderFull(row); loadEditFields(row); }
function renderFull(row){ const roles=['Provider','RN','MA','PSR','OM']; const tiers=['Primary','Secondary','Tertiary']; let h='<table><thead><tr><th>Tier</th>'+roles.map(r=>'<th>'+r+'</th>').join('')+'</tr></thead><tbody>'; tiers.forEach(t=>{ h+='<tr><th>'+t+'</th>'+roles.map(r=>'<td>'+escapeHtml(row[r+' '+t]||'—')+'</td>').join('')+'</tr>'; }); h+='</tbody></table>'; fullDetailsEl.innerHTML=h; }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function loadEditFields(row){ if(el('editPanel').classList.contains('hidden')) return; const role=roleKey(); el('editPrimary').value=row[role+' Primary']||''; el('editSecondary').value=row[role+' Secondary']||''; el('editTertiary').value=row[role+' Tertiary']||''; el('editNotes').value=row.Notes||''; }
function saveEdits(){ const row=currentRow(); if(!row) return; const role=roleKey(); row[role+' Primary']=el('editPrimary').value; row[role+' Secondary']=el('editSecondary').value; row[role+' Tertiary']=el('editTertiary').value; row.Notes=el('editNotes').value; render(); }
function download(name, text){ const blob=new Blob([text],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();}, 0); }
async function init(){ try{ initControls(); DATA=await loadCSV(MAIN_CSV); ALWAYS_ROWS=await loadCSV(ALWAYS_CSV); el('alwaysTrue').textContent=(ALWAYS_ROWS[0]&&ALWAYS_ROWS[0].Text)||'—'; el('editAlways').value=(ALWAYS_ROWS[0]&&ALWAYS_ROWS[0].Text)||''; render(); } catch(e){ el('loadError').classList.remove('hidden'); el('loadError').textContent='Could not load CSV files. Make sure this HTML and the two CSVs are in the same GitHub Pages folder, and open the page through GitHub Pages or a local server. Details: '+e.message; } }
[providersEl,rnsEl,masEl,psrsEl,roleEl].forEach(x=>x.addEventListener('change',render));
el('toggleEdit').addEventListener('click',()=>{ el('editPanel').classList.toggle('hidden'); render(); });
el('saveEdits').addEventListener('click',saveEdits);
el('exportMain').addEventListener('click',()=>download('nap_playbook_data.csv', toCSV(DATA)));
el('exportAlways').addEventListener('click',()=>download('nap_playbook_always_true.csv', toCSV(ALWAYS_ROWS)));
el('toggleAlwaysEdit').addEventListener('click',()=>el('alwaysEditBox').classList.toggle('hidden'));
el('saveAlways').addEventListener('click',()=>{ if(!ALWAYS_ROWS.length) ALWAYS_ROWS=[{Section:'Always True', Text:''}]; ALWAYS_ROWS[0].Text=el('editAlways').value; el('alwaysTrue').textContent=ALWAYS_ROWS[0].Text||'—'; });
init();
</script>
</body>
</html>
