<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Sheep Field Finger Walk - Visual Beta 2</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#102d13; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; touch-action:none; user-select:none; }
  #game { display:block; width:100vw; height:100vh; touch-action:none; background:#317a2d; }
  #hud { position:fixed; top:8px; left:8px; right:8px; color:white; text-shadow:0 2px 5px rgba(0,0,0,.75); font-weight:850; pointer-events:none; display:grid; grid-template-columns:1fr auto; gap:4px 10px; z-index:3; font-size:14px; }
  #levelName { grid-column:1 / span 2; font-size:16px; }
  #message { position:fixed; inset:0; display:grid; place-items:center; text-align:center; color:white; background:rgba(0,0,0,.45); font-size:23px; font-weight:900; padding:28px; z-index:4; }
  #message small { display:block; margin:12px auto 0; max-width:500px; font-size:15px; line-height:1.35; font-weight:550; opacity:.96; }
  button { margin-top:16px; font-size:18px; padding:10px 16px; border:0; border-radius:12px; font-weight:900; background:white; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><div id="levelName">Level 1</div><div id="distance">Field: 0%</div><div id="status">Use two fingers</div></div>
<div id="message"><div>Sheep Field Finger Walk: Easy / Hard Beta<small>Drag downward to walk forward. Easy restarts the current field; Hard restarts from Level 1. Creeks and ditches require at least one stone step, with slightly softer edge detection.</small><button onclick="startGame('easy')">Easy Mode</button><button onclick="startGame('hard')">Hard Mode</button></div></div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const levelNameEl=document.getElementById('levelName'),distanceEl=document.getElementById('distance'),statusEl=document.getElementById('status'),messageEl=document.getElementById('message');
let W=0,H=0,DPR=1,running=false,lost=false,won=false,lastT=0;
const WALK_SCALE=1.12,FOOT_RADIUS=28,COURSE_LENGTH=3000;
let gameMode='easy';
function GATE_ZONE(){return COURSE_LENGTH+Math.min(320,Math.max(220,H*.32))}
function GATE_PASS_AFTER(){return COURSE_LENGTH+H+160}
let levelIndex=0,progress=0,levelTransitionFlash=0,activePointers=new Map(),feet=[],trails=[],splashes=[];
let manure=[],creeks=[],ditches=[],sheep=[],grassBlades=[],flowers=[],rocks=[],rainDrops=[],gate=null,stormClock=0,stormLimit=0,rainAmount=0;
const LEVELS=[
{name:'1. Friendly Pasture',manure:10,water:0,ditch:0,sheep:0,storm:false,latch:'slide',palette:0},
{name:'2. Fresh Droppings',manure:17,water:0,ditch:0,sheep:0,storm:false,latch:'slide',palette:0},
{name:'3. Beck Crossing',manure:18,water:1,ditch:0,sheep:0,storm:false,latch:'lift',palette:1},
{name:'4. Long Beck',manure:20,water:2,ditch:0,sheep:0,storm:false,latch:'rotate',palette:1},
{name:'5. Old Drainage Ditch',manure:21,water:1,ditch:1,sheep:0,storm:false,latch:'pull',palette:2},
{name:'6. Curious Sheep',manure:22,water:1,ditch:1,sheep:2,storm:false,latch:'slide',palette:2},
{name:'7. Crowded Lower Field',manure:27,water:2,ditch:1,sheep:3,storm:false,latch:'lift',palette:2},
{name:'8. Rain Starts',manure:28,water:2,ditch:1,sheep:3,storm:true,latch:'rotate',palette:3},
{name:'9. Soggy Rush',manure:31,water:2,ditch:2,sheep:4,storm:true,latch:'pull',palette:3},
{name:'10. The Flooded Cut',manure:32,water:3,ditch:1,sheep:4,storm:true,latch:'combo',palette:3},
{name:'11. Sheep Traffic',manure:34,water:2,ditch:2,sheep:6,storm:true,latch:'slide',palette:4},
{name:'12. Broken Footbridge',manure:35,water:3,ditch:2,sheep:5,storm:true,latch:'lift',palette:4},
{name:'13. Boggy Upper Meadow',manure:38,water:3,ditch:2,sheep:6,storm:true,latch:'rotate',palette:4},
{name:'14. The Wall Maze',manure:40,water:2,ditch:3,sheep:7,storm:true,latch:'pull',palette:5},
{name:'15. Storm Over the Fell',manure:44,water:3,ditch:3,sheep:8,storm:true,latch:'combo',palette:5}
];
const PALETTES=[
{grass:'#357f31',path:'rgba(210,190,120,.08)',sky:0},{grass:'#3b8835',path:'rgba(214,198,134,.10)',sky:0},{grass:'#34803d',path:'rgba(180,165,105,.09)',sky:0},
{grass:'#2f7140',path:'rgba(155,145,105,.08)',sky:1},{grass:'#2d6742',path:'rgba(135,130,100,.08)',sky:1},{grass:'#285a3d',path:'rgba(120,120,95,.08)',sky:1}
];
function resize(){DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));W=innerWidth|0;H=innerHeight|0;canvas.width=(W*DPR)|0;canvas.height=(H*DPR)|0;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
addEventListener('resize',resize);resize();
function rand(a,b){return a+Math.random()*(b-a)} function choice(a){return a[Math.floor(Math.random()*a.length)]} function dist(a,b,c,d){return Math.hypot(a-c,b-d)} function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function startGame(mode='easy'){gameMode=mode;levelIndex=0;loadLevel(false);messageEl.style.display='none';running=true;lost=false;won=false;lastT=performance.now();requestAnimationFrame(loop)}
function restartAfterLoss(){if(gameMode==='hard')levelIndex=0;loadLevel(false);messageEl.style.display='none';running=true;lost=false;won=false;lastT=performance.now();requestAnimationFrame(loop)}
function loadLevel(keepFingers=true){const L=LEVELS[levelIndex];progress=0;levelTransitionFlash=1;gate=null;trails=[];splashes=[];manure=[];creeks=[];ditches=[];sheep=[];grassBlades=[];flowers=[];rocks=[];rainDrops=[];rainAmount=0;stormClock=0;stormLimit=L.storm?Math.max(20,42-levelIndex*1.55):0;if(!keepFingers)activePointers.clear();makeScenery(L);makeHazards(L);makeGate(L);updateHud()}
function makeScenery(L){for(let i=0;i<1450;i++)grassBlades.push({x:rand(0,W),y:rand(-COURSE_LENGTH-H,H),len:rand(7,25),tilt:rand(-6,6),shade:rand(0,45)|0,thick:rand(.7,1.9)});let fc=Math.max(12,46-levelIndex*2);for(let i=0;i<fc;i++)flowers.push({x:rand(20,W-20),y:rand(-COURSE_LENGTH+180,H),r:rand(2,4),kind:rand(0,3)|0});for(let i=0;i<24+levelIndex;i++)rocks.push({x:rand(15,W-15),y:rand(-COURSE_LENGTH,H),r:rand(4,12),shade:rand(120,170)})}
function makeHazards(L){for(let i=0;i<L.manure;i++){let d=rand(340,COURSE_LENGTH-460);manure.push({x:rand(42,W-42),y:-d,r:rand(17,25+levelIndex*.7),squish:rand(.75,1.25)})}for(let i=0;i<L.water;i++){let base=650+i*((COURSE_LENGTH-1200)/Math.max(1,L.water)),y=-rand(base,base+360),width=rand(135,240+levelIndex*7);creeks.push(makeCrossing('water',y,width,4+Math.floor(levelIndex/4)))}for(let i=0;i<L.ditch;i++){let base=1000+i*((COURSE_LENGTH-1350)/Math.max(1,L.ditch)),y=-rand(base,base+420),width=rand(120,215+levelIndex*5);ditches.push(makeCrossing('ditch',y,width,3+Math.floor(levelIndex/5)))}for(let i=0;i<L.sheep;i++)sheep.push({x:rand(60,W-60),y:-rand(520,COURSE_LENGTH-500),vx:choice([-1,1])*rand(18,42+levelIndex*2.5),phase:rand(0,Math.PI*2),r:rand(25,34)})}
function makeCrossing(type,y,w,stones){let pathX=rand(W*.22,W*.78),stoneList=[];for(let i=0;i<stones;i++){let t=stones===1?.5:i/(stones-1);stoneList.push({x:clamp(pathX+rand(-45,45)+Math.sin(i*1.7)*35,45,W-45),y:y-w/2+28+t*(w-56),rx:rand(30,44),ry:rand(18,27),rot:rand(-.35,.35)})}return{type,y,w,stones:stoneList,touched:false,missed:false}}
function makeGate(L){gate={y:-COURSE_LENGTH,type:L.latch,opened:false,openAmount:0,slider:0,angle:0,pulled:0,comboStep:0,latchX:W*.5}}
function worldToScreenY(y){return y+progress} function screenToCanvas(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
canvas.addEventListener('pointerdown',e=>{e.preventDefault();canvas.setPointerCapture(e.pointerId);const p=screenToCanvas(e);activePointers.set(e.pointerId,{id:e.pointerId,x:p.x,y:p.y,lastX:p.x,lastY:p.y})});
canvas.addEventListener('pointermove',e=>{if(!activePointers.has(e.pointerId)||!running)return;e.preventDefault();const p=screenToCanvas(e),pt=activePointers.get(e.pointerId),dx=p.x-pt.x,dy=p.y-pt.y;pt.lastX=pt.x;pt.lastY=pt.y;pt.x=p.x;pt.y=p.y;trails.push({x:p.x,y:p.y,age:0,maxAge:1,rot:rand(-.25,.25)});const gateOnScreen=gate&&worldToScreenY(gate.y)>-40&&worldToScreenY(gate.y)<H*.82;if(gateOnScreen&&!gate.opened)handleGateMove(pt,dx,dy);if(dy>0){if(!gate.opened&&progress>=GATE_ZONE())progress=GATE_ZONE();else progress+=dy*WALK_SCALE}if(!gate.opened&&progress>GATE_ZONE())progress=GATE_ZONE();if(gate.opened&&progress>=GATE_PASS_AFTER())advanceLevelSeamlessly()});
canvas.addEventListener('pointerup',endPointer);canvas.addEventListener('pointercancel',endPointer);canvas.addEventListener('pointerleave',endPointer);
function endPointer(e){activePointers.delete(e.pointerId);if(running&&activePointers.size===0&&!lost&&!won)lose('No jumping','At least one finger has to stay on the ground.')}
function plantedFingerCount(exceptId=null){let c=0;for(const p of activePointers.values())if(p.id!==exceptId)c++;return c}
function handleGateMove(pointer,dx,dy){if(!gate||gate.opened)return;const y=worldToScreenY(gate.y),latchY=y+75,near=dist(pointer.x,pointer.y,gate.latchX,latchY)<118;if(!near)return;if(plantedFingerCount(pointer.id)<1){lose('You let go of the ground','Keep one finger planted while the other opens the latch.');return}const t=gate.type;if(t==='slide'){gate.slider=clamp(gate.slider+Math.max(0,dx)/145,0,1);if(gate.slider>=1)openGate()}else if(t==='lift'){gate.pulled=clamp(gate.pulled+Math.max(0,-dy)/120,0,1);if(gate.pulled>=1)openGate()}else if(t==='rotate'){gate.angle=clamp(gate.angle+Math.abs(dx)/160+Math.max(0,-dy)/220,0,1);if(gate.angle>=1)openGate()}else if(t==='pull'){gate.pulled=clamp(gate.pulled+Math.max(0,dy)/140,0,1);if(gate.pulled>=1)openGate()}else if(t==='combo'){if(gate.comboStep===0){gate.slider=clamp(gate.slider+Math.max(0,dx)/135,0,1);if(gate.slider>=1)gate.comboStep=1}else{gate.pulled=clamp(gate.pulled+Math.max(0,-dy)/125,0,1);if(gate.pulled>=1)openGate()}}}
function openGate(){gate.opened=true;gate.openAmount=0;splashes.push({x:gate.latchX,y:worldToScreenY(gate.y)+72,age:0,maxAge:.65,type:'spark'})}
function advanceLevelSeamlessly(){if(levelIndex>=LEVELS.length-1){win();return}levelIndex++;loadLevel(true)}
function lose(title,sub){lost=true;running=false;messageEl.style.display='grid';const label=gameMode==='hard'?'Restart from Level 1':'Restart this level';messageEl.innerHTML=`<div>${title}<small>${sub}</small><button onclick="restartAfterLoss()">${label}</button></div>`}
function win(){won=true;running=false;messageEl.style.display='grid';messageEl.innerHTML=`<div>You crossed all 15 fields<small>Continuous beta complete. Every playthrough has a different path, with the same feature progression.</small><button onclick="startGame()">Play again</button></div>`}
function hexToRgb(hex){const h=hex.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]}
function drawGrass(){const L=LEVELS[levelIndex],P=PALETTES[L.palette],[r,g,b]=hexToRgb(P.grass),dark=rainAmount*35;ctx.fillStyle=`rgb(${r-dark},${g-dark},${b-dark})`;ctx.fillRect(0,0,W,H);if(P.sky||rainAmount>.05){for(let i=0;i<4;i++){ctx.fillStyle=`rgba(20,35,35,${.035+rainAmount*.035})`;ctx.beginPath();ctx.ellipse((i*W/3+progress*.08)%(W+220)-110,H*(.2+i*.18),W*.55,H*.11,.15,0,Math.PI*2);ctx.fill()}}ctx.fillStyle=P.path;ctx.beginPath();ctx.ellipse(W/2+Math.sin(progress/350)*35,H/2,W*.25,H*.92,.05,0,Math.PI*2);ctx.fill();for(const tr of trails){let a=1-tr.age/tr.maxAge;ctx.save();ctx.translate(tr.x,tr.y);ctx.rotate(tr.rot);ctx.fillStyle=`rgba(205,235,150,${.20*a})`;ctx.beginPath();ctx.ellipse(0,0,19,34,0,0,Math.PI*2);ctx.fill();ctx.restore()}for(const ro of rocks){let sy=worldToScreenY(ro.y);if(sy<-20||sy>H+20)continue;ctx.fillStyle=`rgba(${ro.shade},${ro.shade},${ro.shade-10},.55)`;ctx.beginPath();ctx.ellipse(ro.x,sy,ro.r*1.4,ro.r,0,0,Math.PI*2);ctx.fill()}for(const fl of flowers){let sy=worldToScreenY(fl.y);if(sy<-15||sy>H+15)continue;ctx.fillStyle=fl.kind===0?'rgba(250,245,120,.75)':fl.kind===1?'rgba(230,210,255,.7)':'rgba(255,255,255,.72)';ctx.beginPath();ctx.arc(fl.x,sy,fl.r,0,Math.PI*2);ctx.fill()}for(const gb of grassBlades){let sy=worldToScreenY(gb.y);if(sy<-30||sy>H+30)continue;ctx.strokeStyle=`rgba(${70+gb.shade},${150+gb.shade},${55+gb.shade},.78)`;ctx.lineWidth=gb.thick;ctx.beginPath();ctx.moveTo(gb.x,sy);ctx.lineTo(gb.x+gb.tilt,sy-gb.len);ctx.stroke()}}
function drawManure(){for(const m of manure){let sy=worldToScreenY(m.y);if(sy<-60||sy>H+60)continue;ctx.save();ctx.translate(m.x,sy);ctx.scale(m.squish,1);ctx.fillStyle='rgba(0,0,0,.16)';ctx.beginPath();ctx.ellipse(4,5,m.r*1.05,m.r*.66,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4a2b18';ctx.beginPath();ctx.ellipse(0,0,m.r,m.r*.72,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#6a3d20';ctx.beginPath();ctx.ellipse(-m.r*.25,-m.r*.15,m.r*.32,m.r*.2,-.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.13)';ctx.beginPath();ctx.ellipse(-m.r*.25,-m.r*.25,m.r*.12,m.r*.07,0,0,Math.PI*2);ctx.fill();ctx.restore()}}
function drawCrossingBand(c){let sy=worldToScreenY(c.y);if(sy<-c.w-80||sy>H+c.w+80)return;if(c.type==='water'){let grad=ctx.createLinearGradient(0,sy-c.w/2,0,sy+c.w/2);grad.addColorStop(0,'rgba(30,115,155,.82)');grad.addColorStop(.5,'rgba(75,160,200,.9)');grad.addColorStop(1,'rgba(25,105,150,.84)');ctx.fillStyle=grad;ctx.fillRect(0,sy-c.w/2,W,c.w);ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;for(let x=-20;x<W+40;x+=58){let yy=sy+Math.sin(x*.04+progress*.05)*c.w*.22;ctx.beginPath();ctx.moveTo(x,yy);ctx.quadraticCurveTo(x+22,yy-7,x+45,yy);ctx.stroke()}}else{ctx.fillStyle='rgba(34,24,18,.92)';ctx.fillRect(0,sy-c.w/2,W,c.w);ctx.fillStyle='rgba(20,12,8,.55)';ctx.fillRect(0,sy-c.w*.18,W,c.w*.36)}for(const st of c.stones){let stY=worldToScreenY(st.y);ctx.save();ctx.translate(st.x,stY);ctx.rotate(st.rot);ctx.fillStyle=c.type==='water'?'#a69878':'#6f8f42';ctx.beginPath();ctx.ellipse(0,0,st.rx,st.ry,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=2;ctx.stroke();ctx.restore()}}
function drawWaterAndDitches(){for(const c of creeks)drawCrossingBand(c);for(const d of ditches)drawCrossingBand(d)}
function drawSheep(dt){for(const s of sheep){s.phase+=dt*1.55;s.x+=s.vx*dt;if(s.x<42||s.x>W-42)s.vx*=-1;let sy=worldToScreenY(s.y)+Math.sin(s.phase)*4;if(sy<-90||sy>H+90)continue;ctx.fillStyle='rgba(0,0,0,.14)';ctx.beginPath();ctx.ellipse(s.x+4,sy+8,s.r*1.2,s.r*.45,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f2efe6';ctx.beginPath();ctx.ellipse(s.x,sy,s.r*1.12,s.r*.78,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.beginPath();ctx.arc(s.x+Math.sign(s.vx)*s.r*.86,sy-3,s.r*.32,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1f1f1f';ctx.lineWidth=3;for(let i=-1;i<=1;i+=2){ctx.beginPath();ctx.moveTo(s.x-12*i,sy+s.r*.45);ctx.lineTo(s.x-16*i,sy+s.r*.85);ctx.stroke()}ctx.fillStyle='#eee';for(let i=-1;i<=1;i++){ctx.beginPath();ctx.arc(s.x+i*12,sy-s.r*.45,9,0,Math.PI*2);ctx.fill()}}}
function drawGate(dt){if(!gate)return;let y=worldToScreenY(gate.y);if(y<-170||y>H+170)return;if(gate.opened)gate.openAmount=clamp(gate.openAmount+dt*1.8,0,1);ctx.fillStyle='#85857d';ctx.fillRect(0,y,W,62);for(let x=-20;x<W;x+=48){ctx.strokeStyle='rgba(0,0,0,.28)';ctx.strokeRect(x,y,48,31);ctx.strokeRect(x+20,y+31,48,31)}let gx=W/2,leftOpen=gate.openAmount*52,rightOpen=gate.openAmount*52;ctx.fillStyle='#2d5b2b';ctx.fillRect(gx-86,y+12,172,105);drawWoodGateHalf(gx-74-leftOpen,y+18,-1,gate.openAmount);drawWoodGateHalf(gx+4+rightOpen,y+18,1,gate.openAmount);if(!gate.opened)drawLatch(y);else{ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='bold 14px system-ui';ctx.textAlign='center';ctx.fillText('Walk through',gx,y+134)}}
function drawWoodGateHalf(x,y,side,open){ctx.save();ctx.translate(x+(side<0?70:0),y);ctx.rotate(side*open*.22);ctx.translate(-(side<0?70:0),0);ctx.fillStyle='#6d4a2d';ctx.fillRect(0,0,70,96);ctx.strokeStyle='#3b2615';ctx.lineWidth=5;for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(6,16+i*20);ctx.lineTo(64,16+i*20);ctx.stroke()}ctx.restore()}
function drawLatch(y){let lx=gate.latchX,ly=y+75;ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.arc(lx,ly,64,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#d8c26a';ctx.strokeStyle='#d8c26a';ctx.lineWidth=8;if(gate.type==='slide'||gate.type==='combo')ctx.fillRect(lx-40+gate.slider*52,ly-7,80,14);else if(gate.type==='lift')ctx.fillRect(lx-8,ly-36-gate.pulled*36,16,72);else if(gate.type==='rotate'){ctx.save();ctx.translate(lx,ly);ctx.rotate(gate.angle*Math.PI*.65);ctx.fillRect(-40,-7,80,14);ctx.restore()}else if(gate.type==='pull'){ctx.beginPath();ctx.arc(lx,ly+gate.pulled*40,23,0,Math.PI*2);ctx.stroke()}ctx.fillStyle='white';ctx.font='bold 14px system-ui';ctx.textAlign='center';let instruction='Slide latch right';if(gate.type==='lift')instruction='Lift latch up';if(gate.type==='rotate')instruction='Twist latch';if(gate.type==='pull')instruction='Pull ring down';if(gate.type==='combo')instruction=gate.comboStep===0?'Slide right':'Now lift up';ctx.fillText(instruction,W/2,y+136);ctx.font='bold 30px system-ui';let arrow=(gate.type==='lift'||(gate.type==='combo'&&gate.comboStep===1))?'↑':gate.type==='pull'?'↓':gate.type==='rotate'?'↻':'→';ctx.fillText(arrow,lx,ly-72)}
function drawFeet(){feet=Array.from(activePointers.values()).slice(0,2);for(let i=0;i<feet.length;i++){const f=feet[i];ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.arc(f.x,f.y,FOOT_RADIUS,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.82)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(f.x,f.y,FOOT_RADIUS,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(0,0,0,.55)';ctx.font='bold 13px system-ui';ctx.textAlign='center';ctx.fillText(i===0?'L':'R',f.x,f.y+5)}}
function drawRain(dt){const L=LEVELS[levelIndex];if(!L.storm)return;stormClock+=dt;rainAmount=clamp(stormClock/stormLimit,0,1);let target=Math.floor(25+rainAmount*135);while(rainDrops.length<target)rainDrops.push({x:rand(0,W),y:rand(-H,0),v:rand(430,760),len:rand(10,20)});ctx.strokeStyle=`rgba(190,220,255,${.18+rainAmount*.35})`;ctx.lineWidth=2;for(const r of rainDrops){r.y+=r.v*dt;r.x-=r.v*dt*.18;if(r.y>H+40){r.y=rand(-220,-20);r.x=rand(0,W)}ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.lineTo(r.x-5,r.y+r.len);ctx.stroke()}if(rainAmount>=1)lose('The storm caught you','The field flooded before you reached the gate.')}
function drawEffects(dt){for(const sp of splashes)sp.age+=dt;splashes=splashes.filter(sp=>sp.age<sp.maxAge);for(const sp of splashes){let a=1-sp.age/sp.maxAge;ctx.strokeStyle=sp.type==='spark'?`rgba(255,230,120,${a})`:`rgba(210,240,255,${a})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(sp.x,sp.y,10+sp.age*60,0,Math.PI*2);ctx.stroke()}if(levelTransitionFlash>0){levelTransitionFlash=Math.max(0,levelTransitionFlash-dt*1.6);ctx.fillStyle=`rgba(255,255,255,${levelTransitionFlash*.13})`;ctx.fillRect(0,0,W,H)}}
function isOnStone(f,c){for(const st of c.stones){let sy=worldToScreenY(st.y),dx=(f.x-st.x)/(st.rx+FOOT_RADIUS*.58),dy=(f.y-sy)/(st.ry+FOOT_RADIUS*.48);if(dx*dx+dy*dy<=1)return true}return false}
function checkCrossingCollision(f,c){let sy=worldToScreenY(c.y);if(isOnStone(f,c))c.touched=true;const softMargin=Math.max(8,c.w/2-FOOT_RADIUS*.15);if(Math.abs(f.y-sy)<softMargin&&!isOnStone(f,c)){if(c.type==='water')lose('Splash','The water is too wide to step over. Use at least one stepping stone.');else lose('You fell in the ditch','The ditch is too wide. Touch at least one grassy stone.');return true}return false}
function checkRequiredStoneSteps(){for(const c of [...creeks,...ditches]){if(c.touched||c.missed)continue;let bottom=worldToScreenY(c.y)+c.w/2;if(bottom>H+FOOT_RADIUS*1.2){c.missed=true;if(c.type==='water')lose('You skipped the stepping stones','Creeks require at least one stone step.');else lose('You skipped the grassy crossing','Ditches require at least one stone or grassy step.');return true}}return false}
function checkCollisions(){if(activePointers.size===0)return;if(checkRequiredStoneSteps())return;for(const f of activePointers.values()){for(const m of manure){let sy=worldToScreenY(m.y);if(sy<-80||sy>H+80)continue;if(dist(f.x,f.y,m.x,sy)<FOOT_RADIUS*.65+m.r*.75){lose('You stepped in sheep manure','Watch the next step, not just the current one.');return}}for(const c of creeks)if(checkCrossingCollision(f,c))return;for(const d of ditches)if(checkCrossingCollision(f,d))return;for(const s of sheep){let sy=worldToScreenY(s.y);if(sy<-90||sy>H+90)continue;if(dist(f.x,f.y,s.x,sy)<FOOT_RADIUS*.75+s.r*.85){lose('Sheep collision','The sheep are not dangerous, just inconvenient.');return}}}}
function updateTrails(dt){for(const tr of trails)tr.age+=dt;trails=trails.filter(tr=>tr.age<tr.maxAge)}
function updateHud(){const L=LEVELS[levelIndex];levelNameEl.textContent=L.name;distanceEl.textContent=`Field: ${Math.round(clamp(progress/COURSE_LENGTH,0,1)*100)}%`;let s=activePointers.size<2?'Add second finger':'Walk';s=(gameMode==='hard'?'Hard':'Easy')+' · '+s;const gateVisible=gate&&worldToScreenY(gate.y)>-20&&worldToScreenY(gate.y)<H*.9;if(gateVisible&&!gate.opened)s='Open latch';if(gateVisible&&gate.opened)s='Walk through';if(L.storm)s+=` · Rain ${Math.round(rainAmount*100)}%`;statusEl.textContent=s}
function loop(t){if(!running)return;const dt=Math.min(.035,(t-lastT)/1000||.016);lastT=t;updateTrails(dt);drawGrass();drawWaterAndDitches();drawManure();drawSheep(dt);drawGate(dt);drawRain(dt);drawFeet();drawEffects(dt);checkCollisions();updateHud();requestAnimationFrame(loop)}
document.addEventListener('gesturestart',e=>e.preventDefault());
</script>
