<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NAP Playbook</title>
<style>
 :root { --bg:#f7f8fb; --card:#fff; --line:#e5e7eb; --muted:#6b7280; --text:#0f172a; --accent:#2563eb; --accent2:#0ea5e9; --accent3:#10b981; --accent4:#7c3aed; }
 *{box-sizing:border-box} html,body{height:100%}
 body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
 .wrap{max-width:980px;margin:0 auto;padding:20px}
 h1{margin:0 0 12px;font-size:26px}
 .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.05)}
 .panel{padding:14px}
 .controls{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:10px}
 .span-2{grid-column:span 2}
 label{font-size:12px;color:var(--muted);display:block;margin:0 0 6px}
 select{width:100%;appearance:none;background:#fff;border:1px solid var(--line);color:var(--text);padding:10px;border-radius:10px}
 .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
 .pill{display:inline-flex;gap:8px;align-items:center;border:1px solid var(--line);padding:6px 10px;border-radius:999px;color:var(--muted);font-size:13px;background:#fff}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
 @media (max-width: 860px){.grid{grid-template-columns:1fr}}
 .tasks{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
 .tasks .card{min-height:110px}
 .notes{white-space:pre-wrap}
 .hr{height:1px;background:var(--line);margin:12px 0}
 .notice{background:#fff8e1;border:1px solid #fde68a;color:#92400e;padding:8px 10px;border-radius:10px;font-size:14px}
 .heading{font-weight:700;margin-bottom:6px}
 .h-primary{color:var(--accent)} .h-secondary{color:var(--accent2)} .h-tertiary{color:var(--accent3)} .h-notes{color:var(--accent4)}
 table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px} th,td{border:1px solid var(--line);padding:8px;vertical-align:top;background:#fff} th{background:#f3f4f6;text-align:left}
</style>
</head>
<body>
<div class="wrap">
 <h1>NAP Playbook</h1>
 <div class="card panel" style="margin-bottom:14px">
 <div class="row" style="gap:8px">
 <span class="pill"><span class="muted">Play:</span> <b id="playName">—</b></span>
 <span class="pill"><span class="muted">Play Call:</span> <b id="funName">—</b></span>
 </div>
 </div>
 <div class="card panel">
 <div class="controls">
 <div class="span-2"><label>Providers</label><select id="providers"></select></div>
 <div class="span-2"><label>RNs</label><select id="rns"></select></div>
 <div class="span-2"><label>MAs</label><select id="mas"></select></div>
 <div class="span-2"><label>Role</label><select id="role">
 <option>Provider</option><option>RN</option><option>MA</option>
 <option>PSR</option><option>OM</option>
 </select></div>
 </div>
 </div>
 <div class="grid" style="margin-top:14px">
 <div class="card panel">
 <div id="emptyNotice" class="notice" style="display:none">No tasks found for this exact RN/MA play.</div>
 <div class="tasks" style="margin-top:10px">
 <div class="card panel"><div class="heading h-primary">Primary</div><div id="primary">—</div></div>
 <div class="card panel"><div class="heading h-secondary">Secondary</div><div id="secondary">—</div></div>
 <div class="card panel"><div class="heading h-tertiary">Tertiary</div><div id="tertiary">—</div></div>
 </div>
 <div class="hr"></div>
 <div class="heading h-notes">Notes</div>
 <div id="notes" class="notes">—</div>
 <div class="hr"></div>
 <div class="heading">Full Play Details</div>
 <div id="fullDetails">—</div>
 </div>
 <div class="card panel">
 <div style="font-weight:600">Always True</div>
 <div id="alwaysTrue" class="notes">—</div>
 </div>
 </div>
</div>

// Parse the embedded JSON between markers
(function() {
 const raw = document.currentScript.textContent;
 const start = raw.indexOf('===== PLAYBOOK_JSON_START =====');
 const end = raw.indexOf('===== PLAYBOOK_JSON_END =====');
 if (start === -1 || end === -1) throw new Error('JSON markers not found.');
 const jsonText = raw.slice(start + '===== PLAYBOOK_JSON_START ====='.length, end).trim();
 window.__PLAYBOOK__ = JSON.parse(jsonText);
})();

// App code (same UI & behavior as your favorite version)
function funNameFor(rn, ma){
 const formations = ["Blitz","Hail Mary","Shotgun","Option","Sweep","Bootleg","Screen","Draw","Power","Counter"];
 const idx = ((rn||0)*7 + (ma||0)*13) % formations.length;
 const staff = [ (rn!=null? rn + " RN" : null), (ma!=null? ma + " MA" : null) ].filter(Boolean).join(" & ") || "Empty Set";
 return formations[idx] + " – " + staff;
}

let MODEL = (window.__PLAYBOOK__.model || window.__PLAYBOOK__);
let ALWAYS = window.__PLAYBOOK__.alwaysTrue || "";

const el = id => document.getElementById(id);
const providersEl = el('providers'), rnsEl = el('rns'), masEl = el('mas'), roleEl = el('role');
const playNameEl = el('playName'), funNameEl = el('funName');
const primaryEl = el('primary'), secondaryEl = el('secondary'), tertiaryEl = el('tertiary'), notesEl = el('notes');
const alwaysEl = el('alwaysTrue'), emptyNotice = el('emptyNotice'), fullDetailsEl = el('fullDetails');

function fill(sel, min, max, def){ sel.innerHTML=''; for(let i=min;i<=max;i++){ const o=document.createElement('option'); o.value=o.textContent=String(i); if(i===def) o.selected=true; sel.appendChild(o);} }
function initControls(){ fill(providersEl,1,4,4); fill(rnsEl,0,3,0); fill(masEl,0,5,0); roleEl.value='Provider'; }

function findSheet(n){
 const names = Object.keys(MODEL?.sheets||{});
 const lc = s => s.toLowerCase();
 let s = names.find(x => lc(x).startsWith(String(n)) && (lc(x).includes('provider')||lc(x).includes('doctor')));
 if(!s) s = names.find(x => lc(x).startsWith(String(n)));
 return s || null;
}
function exactPlay(plays, rn, ma){ return plays.find(p => p.rn===rn && p.ma===ma) || null; }
function normRole(r){ return (r||'').toLowerCase().trim(); }
function tasksFor(play, role){
 const key = normRole(role);
 const tier = t => (play && play.tasks && play.tasks[t] && play.tasks[t][key]) ? play.tasks[t][key] : '—';
 return {primary:tier('primary'), secondary:tier('secondary'), tertiary:tier('tertiary')};
}

function renderFullDetails(play){
 if(!play || !play.tasks){ fullDetailsEl.textContent = '—'; return; }
 const roles = ['provider','rn','ma','psr','om'];
 const headers = ['Tier','Provider','RN','MA','PSR','OM'];
 const rows = ['primary','secondary','tertiary'];
 const esc = (s)=> (s==null||String(s).trim()==='') ? '—' : String(s);

 let html = '<table><thead><tr>';
 for(const h of headers){ html += '<th>' + h + '</th>'; }
 html += '</tr></thead><tbody>';
 for(const tier of rows){
 html += '<tr><th>'+tier.charAt(0).toUpperCase()+tier.slice(1)+'</th>';
 for(const r of roles){ html += '<td>'+ esc(play.tasks?.[tier]?.[r]) +'</td>'; }
 html += '</tr>';
 }
 html += '</tbody></table>';
 if (play.notes && String(play.notes).trim()!==''){
 html += '<div class="hr"></div><div class="heading h-notes">Notes</div><div class="notes">'+play.notes+'</div>';
 }
 fullDetailsEl.innerHTML = html;
}

function refresh(){
 const p = Number(providersEl.value||4), rn = Number(rnsEl.value||0), ma = Number(masEl.value||0), role = roleEl.value||'Provider';
 const sheet = findSheet(p);

 if(!sheet || !MODEL?.sheets?.[sheet]){
 playNameEl.textContent = '—'; funNameEl.textContent = '—';
 primaryEl.textContent = secondaryEl.textContent = tertiaryEl.textContent = '—';
 notesEl.textContent = '—'; emptyNotice.style.display = 'none'; fullDetailsEl.textContent = '—'; alwaysEl.textContent = ALWAYS || '—';
 return;
 }
 const plays = MODEL.sheets[sheet].plays || [];
 const play = exactPlay(plays, rn, ma);

 playNameEl.textContent = play ? (play.name || '—') : '—';
 const fn = (play && play.funName) ? play.funName : funNameFor(play?.rn, play?.ma);
 funNameEl.textContent = play ? (fn || '—') : '—';

 if(!play){
 primaryEl.textContent = secondaryEl.textContent = tertiaryEl.textContent = '—';
 notesEl.textContent = '—'; emptyNotice.style.display = 'none'; fullDetailsEl.textContent = '—'; alwaysEl.textContent = ALWAYS || '—';
 return;
 }

 const t = tasksFor(play, role);
 primaryEl.textContent = t.primary || '—'; secondaryEl.textContent = t.secondary || '—'; tertiaryEl.textContent = t.tertiary || '—';
 notesEl.textContent = play.notes || '—';
 const allBlank = [t.primary,t.secondary,t.tertiary, play.notes||''].every(v => !v || String(v).trim()==='' || String(v).trim()==='—');
 emptyNotice.style.display = allBlank ? 'block' : 'none';

 renderFullDetails(play);
 alwaysEl.textContent = ALWAYS || '—';
}

document.addEventListener('DOMContentLoaded', ()=>{ initControls(); ['change'].forEach(evt => { providersEl.addEventListener(evt,refresh); rnsEl.addEventListener(evt,refresh); masEl.addEventListener(evt,refresh); roleEl.addEventListener(evt,refresh); }); refresh(); });
</script>
